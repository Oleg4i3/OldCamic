name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip project
        run: unzip SimpleCam.zip

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate wrapper
        working-directory: SimpleCam
        run: gradle wrapper --gradle-version=8.4

      - name: Build APK
        working-directory: SimpleCam
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SimpleCam-debug
          path: SimpleCam/app/build/outputs/apk/debug/app-debug.apk
